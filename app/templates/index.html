<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Магазин Олексієнка</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .product-card {
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .product-card:hover {
            transform: scale(1.03);
        }
        .card img {
            height: 180px;
            object-fit: contain;
        }
        .price {
            font-size: 1rem;
            color: #6c757d;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div th:replace="~{header :: header}"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-end mt-3">
        <button type="button" class="btn btn-outline-success" data-bs-toggle="modal" data-bs-target="#filterModal">
            <i class="bi bi-funnel"></i> Фільтри
        </button>
    </div>
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">Список товарів</h2>
            <div class="row">
                <div th:each="product : ${products}" class="col-md-3">
                    <div class="card mb-4 shadow-sm">
                        <img th:src="${product.imageUrl}" class="bd-placeholder-img card-img-top" alt="Фото товару">
                        <div class="card-body">
                            <h5 th:text="${product.name}"></h5>
                            <p>Виробник: <span th:text="${product.manufacturer}"></span></p>
                            <p>Країна: <span th:text="${product.country}"></span></p>
                            <p>Колір: <span th:text="${product.color}"></span></p>
                            <p>Ціна: <span th:text="${product.price}"></span> грн</p>
                            <form th:action="@{'/cart/add/' + ${product.id}}" method="post" class="add-to-cart-form" th:attr="data-id=${product.id}">
                                <button type="submit" class="btn btn-success">Купити</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade" id="filterModal" tabindex="-1" aria-labelledby="filterModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <form method="get" th:action="@{/products}">
                    <div class="modal-header">
                        <h5 class="modal-title" id="filterModalLabel">Фільтрація товарів</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрити"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="priceRange" class="form-label">Діапазон цін</label>
                            <select id="priceRange" name="priceRange" class="form-select">
                                <option value="" th:selected="${priceRange == null or priceRange == ''}">Будь-яка</option>
                                <option value="0-1000" th:selected="${priceRange == '0-1000'}">0 – 1 000 ₴</option>
                                <option value="1000-5000" th:selected="${priceRange == '1000-5000'}">1 000 – 5 000 ₴</option>
                                <option value="5000-20000" th:selected="${priceRange == '5000-20000'}">5 000 – 20 000 ₴</option>
                                <option value="20000-100000" th:selected="${priceRange == '20000-100000'}">20 000 – 100 000 ₴</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="country" class="form-label">Країна</label>
                            <select id="country" name="country" class="form-select">
                                <option value="" th:selected="${country == null or country == ''}">Будь-яка</option>
                                <option value="Korea" th:selected="${country == 'Korea'}">Корея</option>
                                <option value="USA" th:selected="${country == 'USA'}">США</option>
                                <option value="China" th:selected="${country == 'China'}">Китай</option>
                                <option value="Japan" th:selected="${country == 'Japan'}">Японія</option>
                                <option value="Swiss" th:selected="${country == 'Swiss'}">Швейцарія</option>
                                <option value="Netherlands" th:selected="${country == 'Netherlands'}">Нідерланди</option>
                                <option value="UK" th:selected="${country == 'UK'}">Велика Британія</option>
                                <option value="Ukraine" th:selected="${country == 'Ukraine'}">Україна</option>
                            </select>
                        </div>
                        <!-- Виробник -->
                        <div class="mb-3">
                            <label for="manufacturer" class="form-label">Виробник</label>
                            <select id="manufacturer" name="manufacturer" class="form-select">
                                <option value="" th:selected="${manufacturer == null or manufacturer == ''}">Будь-який</option>
                                <option value="Samsung" th:selected="${manufacturer == 'Samsung'}">Samsung</option>
                                <option value="Apple" th:selected="${manufacturer == 'Apple'}">Apple</option>
                                <option value="Lenovo" th:selected="${manufacturer == 'Lenovo'}">Lenovo</option>
                                <option value="Sony" th:selected="${manufacturer == 'Sony'}">Sony</option>
                                <option value="Dell" th:selected="${manufacturer == 'Dell'}">Dell</option>
                                <option value="Jbl" th:selected="${manufacturer == 'Jbl'}">Jbl</option>
                                <option value="LG" th:selected="${manufacturer == 'LG'}">LG</option>
                                <option value="HP" th:selected="${manufacturer == 'HP'}">HP</option>
                                <option value="Logitech" th:selected="${manufacturer == 'Logitech'}">Logitech</option>
                                <option value="GoPro" th:selected="${manufacturer == 'GoPro'}">GoPro</option>
                                <option value="Wacom" th:selected="${manufacturer == 'Wacom'}">Wacom</option>
                                <option value="Philips" th:selected="${manufacturer == 'Philips'}">Philips</option>
                                <option value="Marshall" th:selected="${manufacturer == 'Marshall'}">Marshall</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <a class="btn btn-outline-secondary" th:href="@{/products}">Скинути</a>
                        <button type="submit" class="btn btn-success">Застосувати</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<a href="/cart"
   class="btn btn-success rounded-circle position-fixed bottom-0 end-0 m-4 d-flex align-items-center justify-content-center position-relative"
   style="width:60px; height:60px;">
    <i class="bi bi-cart-fill fs-4 text-white"></i>
    <span id="cart-count"
          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
          th:text="${session.cartCount != null ? session.cartCount : 0}">
    </span>
</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.querySelectorAll(".add-to-cart-form").forEach(form => {
        form.addEventListener("submit", function(e) {
            e.preventDefault();
            const productId = this.getAttribute("data-id");
            fetch(`/cart/add/${productId}`, {
                method: "POST"
            }).then(res => {
                if (res.ok) {
                    const countSpan = document.getElementById("cart-count");
                    let current = parseInt(countSpan.textContent) || 0;
                    countSpan.textContent = current + 1;
                } else {
                    alert("Сталася помилка при додаванні товару ❌");
                }
            }).catch(() => {
                alert("Помилка з’єднання ❌");
            });
        });
    });
</script>
</body>
</html>
