<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вхід</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{header :: header}"></div>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px;">
        <h2 class="text-center mb-4">Вхід</h2>
        <form action="/login" method="post">
            <div class="mb-3">
                <label for="username" class="form-label">Ім’я користувача</label>
                <input type="text" class="form-control" id="username" name="username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <!-- Повідомлення про помилку -->
            <div id="error-message" th:if="${error}" class="mb-3">
                <div class="text-danger" th:text="${error}"></div>
            </div>
            <div class="d-grid">
                <button type="submit" class="btn btn-success">Увійти</button>
            </div>
        </form>
        <div class="mt-3 text-center">
            <span>Ще не маєте акаунта? <a href="/register">Зареєструйтеся</a></span>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", function() {
        const usernameInput = document.getElementById("username");
        const passwordInput = document.getElementById("password");
        const errorMessage = document.getElementById("error-message");

        function hideError() {
            if (errorMessage) {
                errorMessage.style.display = "none";
            }
        }

        if (usernameInput) {
            usernameInput.addEventListener("input", hideError);
        }
        if (passwordInput) {
            passwordInput.addEventListener("input", hideError);
        }
    });
</script>
</body>
</html>
