<header th:fragment="header" xmlns:th="http://www.w3.org/1999/xhtml">
    <nav class="navbar navbar-expand-lg" style="background-color: #28a745;">
        <div class="container">
            <a class="navbar-brand text-white fw-bold" href="/">Магазин Олексієнка</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item" th:if="${session.loggedUser == null}">
                        <a class="nav-link text-white fw-bold" href="/login">Вхід</a>
                    </li>
                    <li class="nav-item" th:if="${session.loggedUser == null}">
                        <a class="nav-link text-white fw-bold" href="/register">Реєстрація</a>
                    </li>

                    <li class="nav-item" th:if="${session.loggedUser != null}">
                        <span class="nav-link text-white">Привіт,

                        </span>
                    </li>
                    <li class="nav-item" th:if="${session.loggedUser != null}">
                        <a href="/logout" class="btn btn-outline-light btn-sm rounded-pill mt-1 px-3 py-1">Вийти</a>
                    </li>

                    <li class="nav-item"><a class="nav-link text-white fw-bold" href="#">UA</a></li>
                    <li class="nav-item"><a class="nav-link text-white fw-bold" href="#">EN</a></li>
